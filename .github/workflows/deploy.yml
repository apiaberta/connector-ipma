name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "${{ secrets.VPS_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts

      - name: Deploy via SSH
        run: |
          ssh -i ~/.ssh/deploy_key -o BatchMode=yes \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "cd /data/apiaberta/connector-ipma && git pull origin main && npm ci --omit=dev && pm2 restart apiaberta-ipma && pm2 save && echo '✅ deployed'"
